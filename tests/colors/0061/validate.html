<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../../../validate.css" />
    <title>Validate: color-mix() all-zero percentages</title>
  </head>
  <body>
    <div class="compare">
      <div>
        <h2>Source (unminified)</h2>
        <style>
          .source a { color: color-mix(in srgb, red 0%, green 0%, blue 0%); }
        </style>
        <div class="source"><a>Test element</a></div>
      </div>
      <div>
        <h2>Expected (minified)</h2>
        <style>
          .expected a { color: #0000; }
        </style>
        <div class="expected"><a>Test element</a></div>
      </div>
    </div>
    <p>
      Both elements above should look identical (fully transparent, so
      invisible). If they differ, the minification is invalid (or the browser
      may not support the modern syntax yet).
    </p>
  </body>
</html>
